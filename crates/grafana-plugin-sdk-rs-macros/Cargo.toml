[package]
name = "grafana-plugin-sdk-rs-macros"
description = "Convenience macros for the grafana-plugin-sdk-rs backend plugin SDK."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

# Imported as `grafana_plugin_sdk_macros` (re-exported from the main crate), matching
# the paths generated by the derive/attribute macros.
[lib]
name = "grafana_plugin_sdk_macros"
proc-macro = true

[dependencies]
darling = "0.23.0"
proc-macro2 = "1.0.60"
quote = "1.0.28"
syn = { version = "2.0.18", features = ["full"] }

[dev-dependencies]
# Enable data + stream so the macro doc examples (which register those services)
# compile under `cargo test`.
grafana-plugin-sdk-rs = { path = "../grafana-plugin-sdk-rs", features = ["data", "stream", "admission"] }
http = "1.0.0"
serde = { version = "1.0.164", features = ["derive"] }
thiserror = "2.0.11"
tokio = { version = "1.38.2", features = ["rt-multi-thread"] }
trybuild = "1.0.80"

[package.metadata.docs.rs]
all-features = true
