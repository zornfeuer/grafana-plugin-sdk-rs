# CI for grafana-plugin-sdk-rs (canonical repository).
#
# Speed strategy:
#   - a custom image (ci/Dockerfile) bakes in the C toolchain + rustfmt/clippy +
#     sccache, so jobs never `apt-get install` or `rustup component add`;
#   - sccache caches compilation (incl. Apache Arrow and aws-lc-rs) across jobs
#     and pipelines — essential on shared runners with no persistent local cache;
#   - all checks run in a single stage in parallel, so wall-clock is the slowest
#     job, not the sum. `test:features` refreshes the shared caches; the rest
#     only read them.

stages:
  - image
  - ci
  - publish

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  CARGO_INCREMENTAL: "0"
  CARGO_NET_RETRY: "5"
  CARGO_TERM_COLOR: "always"
  RUST_BACKTRACE: "1"
  FEATURES: "data,stream,reqwest,httpadapter,automtls,admission,prometheus"
  RUSTC_WRAPPER: "sccache"
  SCCACHE_DIR: $CI_PROJECT_DIR/.sccache
  CI_IMAGE: $CI_REGISTRY_IMAGE/ci:latest

# Deps (registry/git) keyed on the manifests; sccache keyed per branch. Most jobs
# only *pull*; a single job refreshes them (see `.cache_refresh`).
.deps_cache: &deps_cache
  key:
    files:
      - Cargo.toml
      - crates/grafana-plugin-sdk-rs/Cargo.toml
      - crates/grafana-plugin-sdk-rs-macros/Cargo.toml
  paths:
    - .cargo/registry/index
    - .cargo/registry/cache
    - .cargo/git/db

.sccache_cache: &sccache_cache
  key: sccache-$CI_COMMIT_REF_SLUG
  paths:
    - .sccache

default:
  image: $CI_IMAGE
  interruptible: true
  # Fail fast on a hung job instead of running to the hour-long default, and
  # auto-retry the shared-runner flakiness (stuck / system / scheduler failures).
  timeout: 30m
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
  cache:
    - <<: *deps_cache
      policy: pull
    - <<: *sccache_cache
      policy: pull
  after_script:
    - sccache --show-stats || true

# Build the CI image, only when its Dockerfile changes; otherwise `:latest` from a
# previous pipeline is reused. Uses kaniko (no privileged Docker needed).
build-image:
  stage: image
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  variables:
    RUSTC_WRAPPER: ""
  cache: []
  after_script: []
  rules:
    - changes:
        - ci/Dockerfile
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf '%s:%s' "$CI_REGISTRY_USER" "$CI_JOB_TOKEN" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - >-
      /kaniko/executor
      --context "$CI_PROJECT_DIR"
      --dockerfile "$CI_PROJECT_DIR/ci/Dockerfile"
      --destination "$CI_REGISTRY_IMAGE/ci:latest"
      --destination "$CI_REGISTRY_IMAGE/ci:$CI_COMMIT_SHORT_SHA"
      --cache=true
      --cache-repo "$CI_REGISTRY_IMAGE/ci/cache"

fmt:
  stage: ci
  cache: []
  after_script: []
  script:
    - cargo fmt --all --check

clippy:
  stage: ci
  # Runs on the MSRV toolchain and refreshes the shared caches for the other jobs.
  cache:
    - <<: *deps_cache
      policy: pull-push
    - <<: *sccache_cache
      policy: pull-push
  script:
    - cargo clippy --all-targets -- -D warnings
    - cargo clippy --all-targets --features "$FEATURES" -- -D warnings

# The lean default build must stay dependency-light: no Apache Arrow.
test:lean:
  stage: ci
  script:
    - cargo test -p grafana-plugin-sdk-rs
    - "! cargo tree -p grafana-plugin-sdk-rs | grep -qi arrow"

# Full test suite across the MSRV (1.88, the image default) and the latest stable
# toolchain. Each toolchain keeps its own sccache to avoid a cross-job push race.
test:
  stage: ci
  parallel:
    matrix:
      - TOOLCHAIN: ["msrv", "stable"]
  cache:
    - <<: *deps_cache
      policy: pull
    - key: "sccache-$CI_COMMIT_REF_SLUG-$TOOLCHAIN"
      paths:
        - .sccache
      policy: pull-push
  script:
    - if [ "$TOOLCHAIN" = "stable" ]; then rustup default stable; fi
    - rustc --version
    - cargo test --workspace --features "$FEATURES"

# Supply-chain audit: security advisories, license policy, banned/duplicate crates,
# and crate sources. Configured in deny.toml.
deny:
  stage: ci
  cache:
    - <<: *deps_cache
      policy: pull
  after_script: []
  script:
    - cargo deny check

doc:
  stage: ci
  variables:
    RUSTDOCFLAGS: "-D warnings"
  script:
    - cargo doc --no-deps
    - cargo doc --no-deps -p grafana-plugin-sdk-rs --features "$FEATURES"

# Publish to crates.io whenever the workspace version in Cargo.toml is not yet on
# crates.io — i.e. on a version bump merged to `main`. Idempotent: it checks the
# crates.io sparse index first and skips crates already published at that version,
# so re-running on `main` without a bump does nothing.
#
# Requires a masked CI/CD variable `CARGO_REGISTRY_TOKEN` (crates.io API token);
# until it is set the job does not run. The macros crate is published first
# because the main crate depends on it.
publish:
  stage: publish
  cache:
    - <<: *deps_cache
      policy: pull
  after_script: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CARGO_REGISTRY_TOKEN'
  script:
    - |
      set -eu
      version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
      echo "workspace version: $version"
      # Both crates are named `graf…`, so their sparse-index prefix is gr/af/.
      publish_if_new() {
        crate="$1"
        if curl -fsSL "https://index.crates.io/gr/af/$crate" 2>/dev/null | grep -q "\"vers\":\"$version\""; then
          echo "== $crate@$version already on crates.io, skipping"
        else
          echo "== publishing $crate@$version"
          cargo publish -p "$crate" --token "$CARGO_REGISTRY_TOKEN"
        fi
      }
      publish_if_new grafana-plugin-sdk-rs-macros
      publish_if_new grafana-plugin-sdk-rs
