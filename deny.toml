# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
#
# Run locally with all optional features so the full dependency graph is checked:
#   cargo deny --all-features check

[graph]
all-features = true

[advisories]
version = 2
# Fail on any RustSec advisory. Add specific advisory IDs here to acknowledge and
# temporarily ignore one (with a comment explaining why).
ignore = []

[licenses]
version = 2
# All dependencies must be permissively licensed. This list is the union of the
# licenses actually present in the dependency tree.
allow = [
    "MIT",
    "MIT-0",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
# Duplicate versions are common in large trees (arrow, tonic); warn, don't fail.
multiple-versions = "warn"
# Registry wildcard version requirements are a smell; internal path deps are fine.
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
